<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="card-title text-primary">{{ post.title }}</h1>
                        <h6 class="text-muted mb-3">{{ post.date }} | <span class="badge bg-secondary">{{ post.slug }}</span></h6>
                        <hr>
                        <div class="card-text">
                            <p>{{ post.content }}</p>
                        </div>
                        <div class="mt-4">
                            <a href="{% url 'allpost' %}" class="btn btn-outline-primary">Back to Posts</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

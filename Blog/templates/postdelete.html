<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">Confirm Deletion</h4>
                    </div>
                    <div class="card-body">
                        <p>Are you sure you want to delete the following post?</p>
                        <div class="alert alert-warning">
                            <strong>Title:</strong> {{ post.title }}
                        </div>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-flex justify-content-between">
                                <a href="{% url 'allpost' %}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-danger">Yes, Delete Post</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
